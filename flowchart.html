<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>トコサ インタラクティブ診断</title>
  <style>
    :root {
      --ink: #24312d;
      --muted: #66726d;
      --paper: #fffdf8;
      --surface: rgba(255,255,255,.88);
      --line: #dfe7df;
      --green: #46A171;
      --green-soft: #E8F1EC;
      --blue: #2783DE;
      --blue-soft: #E5F2FC;
      --orange: #D5803B;
      --orange-soft: #FBEBDE;
      --sand: #f8f4ec;
      --shadow: 0 18px 48px rgba(53, 81, 66, .13), 0 2px 8px rgba(53, 81, 66, .08);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Noto Sans JP", "Hiragino Sans", "Yu Gothic", system-ui, sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at 12% 8%, rgba(70,161,113,.18), transparent 28%),
        radial-gradient(circle at 88% 12%, rgba(213,128,59,.16), transparent 24%),
        linear-gradient(135deg, #fffdf8 0%, #f4fbf5 55%, #fff8ef 100%);
      padding: 28px;
    }

    .wrap {
      max-width: 1060px;
      margin: 0 auto;
      min-height: 780px;
      border: 1px solid rgba(223,231,223,.95);
      border-radius: 30px;
      background: linear-gradient(180deg, rgba(255,255,255,.95), rgba(255,253,248,.96));
      box-shadow: var(--shadow);
      position: relative;
      overflow: hidden;
    }

    .wrap::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image: radial-gradient(rgba(36,49,45,.10) 1px, transparent 1px);
      background-size: 18px 18px;
      opacity: .20;
      pointer-events: none;
      mask-image: linear-gradient(180deg, #000 0%, transparent 60%);
    }

    header {
      position: relative;
      z-index: 1;
      padding: 40px 44px 20px;
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: 28px;
      align-items: start;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      width: fit-content;
      padding: 7px 12px;
      border-radius: 999px;
      color: #2d7650;
      background: var(--green-soft);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: .04em;
    }

    h1 {
      margin: 18px 0 12px;
      font-size: clamp(34px, 5vw, 58px);
      line-height: 1.04;
      letter-spacing: -.045em;
    }

    .lead {
      margin: 0;
      max-width: 650px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.75;
    }

    .status-card {
      background: rgba(255,255,255,.76);
      border: 1px solid var(--line);
      border-radius: 22px;
      padding: 20px;
      min-height: 146px;
    }

    .status-title {
      margin-bottom: 12px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .09em;
    }

    .history {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      min-height: 38px;
      align-items: flex-start;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      max-width: 100%;
      padding: 8px 11px;
      border-radius: 999px;
      background: var(--sand);
      border: 1px solid var(--line);
      color: #42514b;
      font-size: 13px;
      font-weight: 700;
    }

    .chip::before { content: "✓"; color: var(--green); font-weight: 900; }

    main {
      position: relative;
      z-index: 1;
      padding: 12px 44px 44px;
    }

    .stage {
      display: grid;
      grid-template-columns: .88fr 1.12fr;
      gap: 26px;
      align-items: stretch;
    }

    .visual {
      border: 1px solid var(--line);
      border-radius: 26px;
      background:
        radial-gradient(circle at 24% 18%, rgba(70,161,113,.18), transparent 28%),
        radial-gradient(circle at 82% 80%, rgba(39,131,222,.14), transparent 32%),
        #fff;
      padding: 28px;
      display: grid;
      align-content: center;
      min-height: 430px;
      position: relative;
    }

    .visual-mark {
      width: 178px;
      height: 178px;
      margin: 0 auto 24px;
      border-radius: 44px;
      display: grid;
      place-items: center;
      font-size: 72px;
      background: rgba(255,255,255,.82);
      border: 1px solid var(--line);
      box-shadow: 0 10px 28px rgba(53,81,66,.09);
      transition: transform .22s ease, background .22s ease;
    }

    .visual-copy {
      text-align: center;
      font-size: 22px;
      font-weight: 900;
      line-height: 1.42;
      letter-spacing: -.02em;
    }

    .visual-sub {
      margin-top: 10px;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.65;
    }

    .panel {
      border: 1px solid var(--line);
      border-radius: 26px;
      background: rgba(255,255,255,.90);
      padding: 28px;
      min-height: 430px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 8px 26px rgba(53,81,66,.06);
    }

    .step-label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .10em;
      margin-bottom: 12px;
    }

    .question {
      margin: 0 0 22px;
      font-size: clamp(25px, 3vw, 36px);
      line-height: 1.25;
      letter-spacing: -.035em;
    }

    .options {
      display: grid;
      gap: 12px;
      margin-top: 2px;
    }

    button.option {
      appearance: none;
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 17px 18px;
      background: #fff;
      color: var(--ink);
      text-align: left;
      cursor: pointer;
      display: grid;
      grid-template-columns: 42px 1fr 24px;
      gap: 13px;
      align-items: center;
      font: inherit;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
      min-height: 74px;
    }

    button.option:hover {
      transform: translateY(-2px);
      border-color: #cbd9cf;
      box-shadow: 0 10px 22px rgba(53,81,66,.10);
      background: #fffefa;
    }

    button.option:focus-visible {
      outline: 3px solid rgba(39,131,222,.32);
      outline-offset: 3px;
    }

    .option-icon {
      width: 42px;
      height: 42px;
      border-radius: 15px;
      display: grid;
      place-items: center;
      background: var(--sand);
      font-size: 22px;
    }

    .option-title {
      display: block;
      font-size: 17px;
      font-weight: 900;
      line-height: 1.38;
      letter-spacing: -.01em;
    }

    .option-desc {
      display: block;
      margin-top: 4px;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.45;
    }

    .arrow { color: var(--muted); font-size: 20px; }

    .result {
      margin-top: auto;
      border-radius: 22px;
      padding: 24px;
      color: #fff;
      position: relative;
      overflow: hidden;
    }

    .result::after {
      content: "";
      position: absolute;
      right: 18px;
      bottom: 16px;
      width: 64px;
      height: 64px;
      border-radius: 50%;
      border: 12px solid rgba(255,255,255,.18);
    }

    .result.consumer { background: linear-gradient(135deg, #3f9a69, #69b889); }
    .result.provider { background: linear-gradient(135deg, #cc7734, #e6a15b); }
    .result.station { background: linear-gradient(135deg, #2779c8, #5e9fe8); }
    .result.neutral { background: linear-gradient(135deg, #5f6f68, #8fa098); }

    .result-kicker { font-size: 12px; font-weight: 900; letter-spacing: .12em; opacity: .84; }
    .result-title { margin-top: 8px; font-size: clamp(28px, 3vw, 38px); font-weight: 950; line-height: 1.15; letter-spacing: -.035em; }
    .result-text { margin-top: 12px; max-width: 520px; font-size: 15px; line-height: 1.7; opacity: .94; }
    .result-page { margin-top: 16px; font-size: 14px; font-weight: 900; opacity: .92; }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .ghost {
      appearance: none;
      border: 1px solid var(--line);
      background: #fff;
      color: #40504a;
      border-radius: 999px;
      padding: 11px 14px;
      cursor: pointer;
      font: inherit;
      font-size: 14px;
      font-weight: 800;
      transition: background .16s ease, transform .16s ease;
    }

    .ghost:hover { background: var(--sand); transform: translateY(-1px); }
    .ghost:focus-visible { outline: 3px solid rgba(39,131,222,.28); outline-offset: 2px; }

    .fade { animation: fade .22s ease; }
    @keyframes fade {
      from { opacity: .15; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 860px) {
      body { padding: 16px; }
      header { grid-template-columns: 1fr; padding: 30px 24px 16px; }
      main { padding: 8px 24px 30px; }
      .stage { grid-template-columns: 1fr; }
      .visual { min-height: 260px; padding: 22px; }
      .visual-mark { width: 128px; height: 128px; border-radius: 32px; font-size: 54px; }
      .panel { min-height: auto; }
    }

    @media (max-width: 480px) {
      body { padding: 10px; }
      .wrap { border-radius: 22px; }
      header, main { padding-left: 18px; padding-right: 18px; }
      .panel { padding: 20px; border-radius: 22px; }
      .visual { border-radius: 22px; }
      button.option { grid-template-columns: 38px 1fr 18px; padding: 14px; }
      .option-icon { width: 38px; height: 38px; }
    }
  </style>
</head>
<body>
  <article class="wrap" aria-label="トコサ インタラクティブ診断">
    <header>
      <div>
        <div class="eyebrow">ToCSA Start Guide｜クリック診断</div>
        <h1>あなたはトコサの<br>どの入口からはじめる？</h1>
        <p class="lead">気になる選択肢をクリックして進むと、トコサとの関わり方が見えてきます。冊子の中で、読者を自分に合うページへ案内するための診断です。</p>
      </div>
      <aside class="status-card" aria-label="選択履歴">
        <div class="status-title">選んだ内容</div>
        <div class="history" id="history"><span class="chip" style="opacity:.68">まだ選択していません</span></div>
      </aside>
    </header>

    <main>
      <section class="stage">
        <div class="visual" aria-hidden="true">
          <div class="visual-mark" id="visualIcon">🌱</div>
          <div class="visual-copy" id="visualCopy">気になる入口を選んで、<br>次の質問へ。</div>
          <div class="visual-sub" id="visualSub">購入する・届ける・場所として支える。<br>関わり方はひとつではありません。</div>
        </div>

        <section class="panel fade" id="panel" aria-live="polite"></section>
      </section>
    </main>
  </article>

  <script>
    const nodes = {
      start: {
        step: 'QUESTION 01',
        icon: '🌱',
        copy: '気になる入口を選んで、<br>次の質問へ。',
        sub: '購入する・届ける・場所として支える。<br>関わり方はひとつではありません。',
        question: 'いま一番気になるのは？',
        options: [
          { label: '地元のものを購入したい', desc: '地域の食品を、日々の暮らしの中で受け取りたい', icon: '🛒', next: 'consumerQ' },
          { label: '自分の商品・サービスを地域で販売・提供したい', desc: '作ったもの・届けたいものを地域につなげたい', icon: '🌾', next: 'providerQ' },
          { label: '地域のためになることをしたい', desc: '買う・作る・場所になるなど、自分に合う関わり方を探したい', icon: '🏠', next: 'communityQ' }
        ]
      },
      consumerQ: {
        step: 'QUESTION 02',
        icon: '🛒',
        copy: '地元から、を日常に。',
        sub: '予約して、生活動線の近くで受け取る。<br>毎日の買い物が地域応援につながります。',
        question: '予約購入して、生活動線の近くで受け取りたい？',
        options: [
          { label: 'はい', desc: '近くの生産者から商品を予約購入し、選んだ結ステーションで受け取る', icon: '✅', result: 'consumer' },
          { label: 'いいえ', desc: 'その場で見て選べる直売所などのお買い物もおすすめです', icon: '🧺', result: 'directShop' }
        ]
      },
      providerQ: {
        step: 'QUESTION 02',
        icon: '🌾',
        copy: '作り、届け、豊かにする。',
        sub: '地域の消費者・地域住民へ、<br>無理なく予約販売できる入口です。',
        question: '販売・提供したいのは？',
        options: [
          { label: '食品（農産物・加工食品など）', desc: '提供日・注文締切・提供先を設定して地域へ届ける', icon: '🥕', result: 'provider' },
          { label: '食品以外の商品・サービス', desc: '今後の取扱い拡大に向けて準備中です', icon: '🧭', result: 'future' }
        ]
      },
      communityQ: {
        step: 'QUESTION 02',
        icon: '🏠',
        copy: '地域との関わり方を選ぶ。',
        sub: '買い物から応援する。作り手になる。<br>場所として生産者と消費者をつなぐ。',
        question: 'どのように地域に関わりたい？',
        options: [
          { label: '日々の買い物から地域を応援したい', desc: '購入する人として、地域の生産者を支える', icon: '🛒', next: 'consumerQ' },
          { label: '作り手として地域を豊かにしたい／支えたい', desc: '提供者として、商品を地域に届ける', icon: '🌾', next: 'providerQ' },
          { label: '場所・拠点として役立ちたい', desc: '商品受け取りの拠点となり、生産者と消費者をつなぐ', icon: '🏠', result: 'station' },
          { label: '自分の地域で地産地消を広めたい', desc: '地域に合う広げ方を、運営と一緒に探す', icon: '🗺️', result: 'spread' },
          { label: '配送することで地域の循環を支えたい', desc: '運搬者としての関わり方は準備中です', icon: '🚚', result: 'delivery' }
        ]
      }
    };

    const results = {
      consumer: {
        type: 'consumer',
        icon: '🛒',
        kicker: '診断結果',
        title: 'トコサの利用者',
        text: '近くの生産者から商品を予約購入し、選択した結ステーションで提供日に受け取る関わり方です。',
        page: 'P4〜「利用者のハジメカタ」へ'
      },
      directShop: {
        type: 'neutral',
        icon: '🧺',
        kicker: 'おすすめの選択肢',
        title: '直売所などでのお買い物',
        text: 'その場で見て選びたい場合は、直売所などの売り場でのお買い物もおすすめです。',
        page: '必要に応じて、トコサの利用も検討できます'
      },
      provider: {
        type: 'provider',
        icon: '🌾',
        kicker: '診断結果',
        title: 'トコサの提供者',
        text: '地域の消費者・地域住民へ、農産物や加工食品などを予約販売する関わり方です。',
        page: 'P8〜「提供者のハジメカタ」へ'
      },
      future: {
        type: 'neutral',
        icon: '🧭',
        kicker: '今後の予定',
        title: '食品以外は準備中',
        text: '食品以外の商品・サービスの取扱いは準備中です。トコサの成長をお待ちください。',
        page: '今後の機能追加で案内予定'
      },
      station: {
        type: 'station',
        icon: '🏠',
        kicker: '診断結果',
        title: 'トコサの結ステーション',
        text: '商品受け取りの拠点として、生産者と消費者をつなぐ関わり方です。',
        page: 'P12〜「結ステーションのハジメカタ」へ'
      },
      spread: {
        type: 'neutral',
        icon: '🗺️',
        kicker: '次の入口',
        title: '地域で広げる相談へ',
        text: '自分の地域で地産地消を広めたい場合は、一緒にできることを探しましょう。まずはお問い合わせへ。',
        page: '問合せ先・法人情報へ'
      },
      delivery: {
        type: 'neutral',
        icon: '🚚',
        kicker: '今後の予定',
        title: '運搬者の関わり方は準備中',
        text: '配送することで地域の循環を支える仕組みは、今後の機能追加として準備中です。',
        page: '今後の機能追加で案内予定'
      }
    };

    let current = 'start';
    let history = [];

    const panel = document.getElementById('panel');
    const historyEl = document.getElementById('history');
    const visualIcon = document.getElementById('visualIcon');
    const visualCopy = document.getElementById('visualCopy');
    const visualSub = document.getElementById('visualSub');

    function setVisual(icon, copy, sub) {
      visualIcon.textContent = icon;
      visualCopy.innerHTML = copy;
      visualSub.innerHTML = sub;
      visualIcon.style.transform = 'scale(.96)';
      requestAnimationFrame(() => { visualIcon.style.transform = 'scale(1)'; });
    }

    function renderHistory() {
      if (!history.length) {
        historyEl.innerHTML = '<span class="chip" style="opacity:.68">まだ選択していません</span>';
        return;
      }
      historyEl.innerHTML = history.map(item => `<span class="chip">${escapeHtml(item)}</span>`).join('');
    }

    function renderNode(id) {
      current = id;
      const node = nodes[id];
      setVisual(node.icon, node.copy, node.sub);
      panel.classList.remove('fade');
      void panel.offsetWidth;
      panel.classList.add('fade');
      panel.innerHTML = `
        <div class="step-label">${node.step}</div>
        <h2 class="question">${node.question}</h2>
        <div class="options">
          ${node.options.map((option, index) => `
            <button class="option" type="button" data-index="${index}">
              <span class="option-icon">${option.icon}</span>
              <span><span class="option-title">${option.label}</span><span class="option-desc">${option.desc}</span></span>
              <span class="arrow">›</span>
            </button>
          `).join('')}
        </div>
        ${history.length ? '<div class="actions"><button class="ghost" type="button" data-action="back">ひとつ戻る</button><button class="ghost" type="button" data-action="reset">最初から</button></div>' : ''}
      `;
    }

    function renderResult(id) {
      const result = results[id];
      setVisual(result.icon, result.title, result.text);
      panel.classList.remove('fade');
      void panel.offsetWidth;
      panel.classList.add('fade');
      panel.innerHTML = `
        <div class="result ${result.type}">
          <div class="result-kicker">${result.kicker}</div>
          <div class="result-title">${result.title}</div>
          <div class="result-text">${result.text}</div>
          <div class="result-page">${result.page}</div>
        </div>
        <div class="actions">
          <button class="ghost" type="button" data-action="back">ひとつ戻る</button>
          <button class="ghost" type="button" data-action="reset">最初から</button>
        </div>
      `;
    }

    panel.addEventListener('click', event => {
      const optionButton = event.target.closest('button.option');
      const actionButton = event.target.closest('button[data-action]');

      if (optionButton) {
        const node = nodes[current];
        const option = node.options[Number(optionButton.dataset.index)];
        history.push(option.label);
        renderHistory();
        if (option.next) renderNode(option.next);
        if (option.result) renderResult(option.result);
        return;
      }

      if (actionButton) {
        const action = actionButton.dataset.action;
        if (action === 'reset') {
          history = [];
          renderHistory();
          renderNode('start');
          return;
        }
        if (action === 'back') {
          history.pop();
          const replay = [...history];
          history = [];
          renderHistory();
          renderNode('start');
          for (const label of replay) {
            const node = nodes[current];
            const option = node.options.find(item => item.label === label);
            if (!option) break;
            history.push(option.label);
            renderHistory();
            if (option.next) renderNode(option.next);
            if (option.result) renderResult(option.result);
          }
        }
      }
    });

    function escapeHtml(value) {
      return String(value)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    renderHistory();
    renderNode('start');
  </script>
</body>
</html>
